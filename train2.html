<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>План на недели 5–28</title>
  <style>
    @page {
      size: A4 landscape;
      margin: 8mm;
    }

    body {
      font-family: Arial, sans-serif;
      color: #111;
      margin: 0;
      padding: 0;
      background: #fff;
    }

    .wrap {
      padding: 10px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 20px;
    }

    h2 {
      margin: 12px 0 6px 0;
      font-size: 14px;
    }

    p, li {
      font-size: 11px;
      margin: 3px 0;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .box {
      border: 1px solid #000;
      padding: 6px 8px;
    }

    .controls {
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid #000;
      background: #fff;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 11px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9px;
    }

    th, td {
      border: 1px solid #000;
      padding: 3px 4px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background: #e9e9e9;
      font-weight: 700;
    }

    td.left, th.left {
      text-align: left;
    }

    tr.deload td {
      background: #f6f6f6;
    }

    tr.block-row td {
      background: #dfe7f7;
      font-weight: 700;
      text-align: left;
      font-size: 10px;
      padding: 5px 6px;
    }

    .small {
      font-size: 9px;
      color: #444;
    }

    .done-box {
      width: 14px;
      height: 14px;
      margin: 0 auto;
      display: block;
    }

    .narrow { width: 42px; }
    .warm { width: 55px; }
    .work { width: 68px; }
    .acc { width: 190px; }
    .scheme { width: 75px; }
    .done { width: 36px; }

    @media print {
      .controls {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <h2>Тренировочная таблица</h2>

    <table id="plan-table">
      <thead>
        <tr>
          <th class="narrow">Нед.</th>
          <th class="narrow">День</th>
          <th class="left">Основное упражнение</th>
          <th class="warm">Разм. 1</th>
          <th class="warm">Разм. 2</th>
          <th class="work">План 1</th>
          <th class="work">План 2</th>
          <th class="work">План 3</th>
          <th class="acc left">Доп. упражнение</th>
          <th class="scheme">Схема</th>
          <th class="scheme">Вес доп.</th>
          <th class="done">✓</th>
        </tr>
      </thead>
      <tbody id="plan-body"></tbody>
    </table>
  </div>

  <script>
    const startWeek = 5;
    const endWeek = 28;

    const plan = {
      benchA: {
        exercise: "Жим лёжа A",
        warm1: "20×12",
        warm2: "40×6",
        weights: {
          5:70,6:70,7:70,8:65,
          9:70,10:70,11:70,12:65,
          13:75,14:75,15:75,16:70,
          17:75,18:75,19:75,20:70,
          21:80,22:80,23:80,24:75,
          25:80,26:80,27:80,28:75
        },
        reps: {
          5:8,6:9,7:10,8:8,
          9:8,10:9,11:10,12:8,
          13:8,14:9,15:10,16:8,
          17:8,18:9,19:10,20:8,
          21:8,22:9,23:10,24:8,
          25:8,26:9,27:10,28:8
        }
      },
      squatA: {
        exercise: "Присед A",
        warm1: "20×10",
        warm2: "40×5",
        weights: {
          5:65,6:65,7:65,8:60,
          9:70,10:70,11:70,12:65,
          13:70,14:70,15:70,16:65,
          17:75,18:75,19:75,20:70,
          21:75,22:75,23:75,24:70,
          25:80,26:80,27:80,28:75
        },
        reps: {
          5:8,6:9,7:10,8:8,
          9:8,10:9,11:10,12:8,
          13:8,14:9,15:10,16:8,
          17:8,18:9,19:10,20:8,
          21:8,22:9,23:10,24:8,
          25:8,26:9,27:10,28:8
        }
      },
      benchB: {
        exercise: "Жим лёжа B",
        warm1: "20×10",
        warm2: "45×5",
        weights: {
          5:75,6:75,7:75,8:70,
          9:80,10:80,11:80,12:75,
          13:80,14:80,15:80,16:75,
          17:85,18:85,19:85,20:80,
          21:85,22:85,23:85,24:80,
          25:90,26:90,27:90,28:85
        },
        reps: {
          5:6,6:7,7:8,8:6,
          9:6,10:7,11:8,12:6,
          13:6,14:7,15:8,16:6,
          17:6,18:7,19:8,20:6,
          21:6,22:7,23:8,24:6,
          25:6,26:7,27:8,28:6
        }
      },
      squatB: {
        exercise: "Присед B",
        warm1: "20×10",
        warm2: "45×5",
        weights: {
          5:75,6:75,7:75,8:70,
          9:75,10:75,11:75,12:70,
          13:80,14:80,15:80,16:75,
          17:80,18:80,19:80,20:75,
          21:85,22:85,23:85,24:80,
          25:85,26:85,27:85,28:80
        },
        reps: {
          5:6,6:7,7:8,8:6,
          9:6,10:7,11:8,12:6,
          13:6,14:7,15:8,16:6,
          17:6,18:7,19:8,20:6,
          21:6,22:7,23:8,24:6,
          25:6,26:7,27:8,28:6
        }
      }
    };

    function isDeloadWeek(week) {
      return week % 4 === 0;
    }

    function workSet(weight, reps) {
      return `${weight}×${reps}`;
    }

    function accessory(day, deload) {
      if (day === "Пн") {
        return deload
          ? ["Тяга гантели к поясу / тяга блока к поясу", "2×8–10"]
          : ["Тяга гантели к поясу / тяга блока к поясу", "3×8–12"];
      }
      if (day === "Вт") {
        return deload
          ? ["Выпады / болгарские приседы", "2×8–10/нога"]
          : ["Выпады / болгарские приседы", "3×8–12/нога"];
      }
      if (day === "Чт") {
        return deload
          ? ["Тяга верхнего блока / подтягивания", "2×8–10"]
          : ["Тяга верхнего блока / подтягивания", "3×8–12"];
      }
      if (day === "Пт") {
        return deload
          ? ["Выпады / болгарские приседы", "2×8–10/нога"]
          : ["Выпады / болгарские приседы", "3×8–12/нога"];
      }
      return ["", ""];
    }

    const schedule = [
      { day: "Пн", key: "benchA" },
      { day: "Вт", key: "squatA" },
      { day: "Чт", key: "benchB" },
      { day: "Пт", key: "squatB" }
    ];

    const blockNames = {
      5:  "Блок 2 — закрепление",
      9:  "Блок 3 — постепенное утяжеление",
      13: "Блок 4 — базовый прогресс",
      17: "Блок 5 — тяжёлая середина цикла",
      21: "Блок 6 — финальный блок",
      25: "Блок 7 — продление прогрессии"
    };

    const tbody = document.getElementById("plan-body");

    for (let w = startWeek; w <= endWeek; w++) {
      if (blockNames[w]) {
        const blockRow = document.createElement("tr");
        blockRow.className = "block-row";
        blockRow.innerHTML = `<td colspan="12">${blockNames[w]} (недели ${w}–${w+3})</td>`;
        tbody.appendChild(blockRow);
      }

      const deload = isDeloadWeek(w);

      schedule.forEach(item => {
        const p = plan[item.key];
        const acc = accessory(item.day, deload);

        const tr = document.createElement("tr");
        if (deload) tr.classList.add("deload");

        const exerciseName = deload
          ? `${p.exercise} — разгрузка`
          : p.exercise;

        tr.innerHTML = `
          <td>${w}</td>
          <td>${item.day}</td>
          <td class="left">${exerciseName}</td>
          <td>${p.warm1}</td>
          <td>${p.warm2}</td>
          <td>${workSet(p.weights[w], p.reps[w])}</td>
          <td>${workSet(p.weights[w], p.reps[w])}</td>
          <td>${workSet(p.weights[w], p.reps[w])}</td>
          <td class="left">${acc[0]}</td>
          <td>${acc[1]}</td>
          <td></td>
          <td><input class="done-box" type="checkbox" /></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function toggleCompact() {
      const table = document.getElementById("plan-table");
      if (table.style.fontSize === "8px") {
        table.style.fontSize = "9px";
      } else {
        table.style.fontSize = "8px";
      }
    }
  </script>
</body>
</html>
